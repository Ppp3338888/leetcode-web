{% extends "base.html" %}
{% block title %}Login — LeetBot{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center" style="margin-top: -40px;">
  <div class="card p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-1">Welcome back</h1>
    <p class="text-gray-500 text-sm mb-6">Log in to manage your contest bot.</p>
    {% if error %}
    <p class="text-red-400 text-sm mb-4 bg-red-900/20 p-3 rounded-lg">{{ error }}</p>
    {% endif %}
    <form method="POST" class="flex flex-col gap-4">
      <div>
        <label class="text-xs text-gray-400 mb-1 block">Email</label>
        <input class="input" type="email" name="email" required placeholder="you@gmail.com">
      </div>
      <div>
        <label class="text-xs text-gray-400 mb-1 block">Password</label>
        <input class="input" type="password" name="password" required placeholder="••••••••">
      </div>
      <button class="btn-primary mt-2">Log in</button>
    </form>
    <p class="text-center text-gray-500 text-sm mt-6">No account? <a href="/signup" class="text-orange-400 hover:underline">Sign up</a></p>
  </div>
</div>
{% endblock %}
